---
name: GitHub Pages - Python Sphinx

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DRAGONFLY_GITHUB_TOKEN: This is just here for autodoc

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --no-default-groups --group docs

      - name: Generate docs
        run: cd docs && uv run make dirhtml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: ./docs/build/dirhtml

  deploy:
    name: Deploy documentation
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build

    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write  # Publish the documentation artifact to GitHub Pages.
      id-token: write  # Authenticate the Pages deployment with GitHub OIDC.

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
