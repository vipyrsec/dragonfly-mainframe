---
name: Lint & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: lint-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint_test:
    name: Lint and test
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16.14@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 1s
          --health-retries 10
          --health-timeout 5s
        ports:
          - 127.0.0.1:5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dragonfly

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run --locked make lint

      - name: Test
        run: uv run --locked make coverage
        env:
          DB_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/dragonfly
          MICROSOFT_TENANT_ID: tenant_id
          MICROSOFT_CLIENT_ID: client_id
          MICROSOFT_CLIENT_SECRET: client_secret
          DRAGONFLY_GITHUB_TOKEN: test
